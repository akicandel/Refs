<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REF — Archivo de Referencias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --muted: #666;
    --accent: #c8ff00;
    --accent2: #ff4d00;
    --card-hover: #1e1e1e;
    --radius: 4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    height: 56px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .logo span {
    color: var(--muted);
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex: 1;
    justify-content: flex-end;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 320px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 0.45rem 0.75rem 0.45rem 2.2rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  /* ── COUNT ── */
  #count {
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── LAYOUT ── */
  .page {
    display: grid;
    grid-template-columns: 200px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* ── SIDEBAR FILTERS ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
    scrollbar-width: none;
  }

  aside::-webkit-scrollbar { display: none; }

  .filter-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 1.25rem;
    margin-bottom: 0.75rem;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0.45rem 1.25rem;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    text-align: left;
    gap: 0.5rem;
  }

  .cat-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }

  .cat-btn.active {
    color: var(--accent);
    background: rgba(200,255,0,0.05);
  }

  .cat-btn .badge {
    font-size: 0.6rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1px 5px;
    min-width: 22px;
    text-align: center;
  }

  .cat-btn.active .badge {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── GRID ── */
  main {
    padding: 2rem;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  /* ── CARD ── */
  .card {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
    cursor: pointer;
  }

  .card:hover { background: var(--card-hover); }

  .card-img {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .card:hover .card-img img {
    transform: scale(1.04);
  }

  /* favicon fallback */
  .card-img.no-thumb {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-img.no-thumb .favicon {
    width: 32px;
    height: 32px;
    opacity: 0.5;
  }

  .card-img .placeholder-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background-image: repeating-linear-gradient(
      45deg,
      var(--text) 0,
      var(--text) 1px,
      transparent 0,
      transparent 50%
    );
    background-size: 8px 8px;
  }

  .card-body {
    padding: 0.75rem 0.9rem 0.85rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    flex: 1;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.3;
    word-break: break-all;
  }

  .card-cat {
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-link-icon {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    background: rgba(14,14,14,0.75);
    backdrop-filter: blur(4px);
    border: 1px solid var(--border);
    border-radius: 2px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .card-link-icon { opacity: 1; }

  /* ── EMPTY ── */
  #empty {
    display: none;
    grid-column: 1/-1;
    padding: 4rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    background: var(--bg);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .page { grid-template-columns: 1fr; }
    aside {
      position: static;
      height: auto;
      border-right: none;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      padding: 1rem;
    }
    .filter-label { width: 100%; }
    .cat-btn { width: auto; border: 1px solid var(--border); border-radius: var(--radius); padding: 0.3rem 0.75rem; }
    main { padding: 1rem; }
    header { padding: 0 1rem; }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card { animation: fadeIn 0.3s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo">REF <span>/ archivo de referencias</span></div>
  <div class="header-right">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Buscar..." autocomplete="off">
    </div>
    <span id="count"></span>
  </div>
</header>

<div class="page">
  <aside>
    <div class="filter-label">Categoría</div>
    <div id="filters"></div>
  </aside>

  <main>
    <div id="grid">
      <div id="empty" style="display:none">No se encontraron referencias.</div>
    </div>
  </main>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1c0bKFArizhXKDUZmgJNYhO_WA78uTyPckO6keg2I96g/gviz/tq?tqx=out:csv';

// ── HELPERS ───────────────────────────────────────────────────────────
function getDomain(url) { try { return new URL(url).hostname; } catch { return ''; } }

function parseCSV(text) {
  const lines = text.trim().split('
');
  // Primera fila = cabeceras
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
  return lines.slice(1).map(line => {
    // Parsear CSV respetando comillas
    const values = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { values.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    values.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/^"|"$/g, '').trim(); });
    return obj;
  }).filter(r => r.url && r.name);
}

const catColors = {
  "Fonts":"#c8ff00","Illustration":"#ff4d00","Animation":"#00cfff",
  "Design":"#ff8800","3D / CGI":"#bf80ff","Typography":"#ffdd00",
  "Art":"#ff69b4","Video":"#00ff9d","NFT":"#ff4d00","Arquitectura":"#80c8ff",
  "Craft":"#ffb347","Film":"#c0c0c0","Color":"#ff6060","Mockup":"#aaffee",
  "Foto":"#ffd6e8","Inspiration":"#c8ff00","Industrial":"#aac0c0",
  "Designs":"#ff8800","Experience":"#00cfff","Mindful":"#80ff80","Spaces":"#d4b896"
};

function getCatColor(cat) {
  if (catColors[cat]) return catColors[cat];
  // Generar color consistente para categorías nuevas
  let hash = 0;
  for (let i = 0; i < cat.length; i++) hash = cat.charCodeAt(i) + ((hash << 5) - hash);
  return `hsl(${Math.abs(hash) % 360}, 70%, 65%)`;
}

// ── ESTADO ────────────────────────────────────────────────────────────
let refs = [];
let activeCategory = 'Todos';
let searchQuery = '';
const imgCache = {};

// ── OG IMAGE ─────────────────────────────────────────────────────────
async function fetchOGImage(pageUrl) {
  const encoded = encodeURIComponent(pageUrl);
  const proxies = [
    { url: 'https://api.allorigins.win/get?url=' + encoded, extract: r => r.json().then(j => j.contents || '') },
    { url: 'https://corsproxy.io/?' + encoded, extract: r => r.text() },
  ];
  let html = '';
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy.url, { signal: AbortSignal.timeout(7000) });
      if (!res.ok) continue;
      html = await proxy.extract(res);
      if (html) break;
    } catch { continue; }
  }
  if (!html) return null;
  const ogPatterns = [
    /property=["']og:image:secure_url["'][^>]*content=["']([^"']+)["']/i,
    /content=["']([^"']+)["'][^>]*property=["']og:image:secure_url["']/i,
    /property=["']og:image["'][^>]*content=["']([^"']+)["']/i,
    /content=["']([^"']+)["'][^>]*property=["']og:image["']/i,
    /name=["']twitter:image["'][^>]*content=["']([^"']+)["']/i,
    /content=["']([^"']+)["'][^>]*name=["']twitter:image["']/i,
  ];
  for (const re of ogPatterns) {
    const m = html.match(re);
    if (m && m[1] && m[1].startsWith('http')) return m[1];
  }
  return null;
}

async function loadImage(url, imgEl, favEl) {
  if (imgCache[url] !== undefined) {
    if (imgCache[url]) { imgEl.src = imgCache[url]; imgEl.style.opacity = '1'; favEl.style.display = 'none'; }
    else { favEl.style.display = 'flex'; }
    return;
  }
  try {
    const ogImg = await fetchOGImage(url);
    if (ogImg) {
      imgCache[url] = ogImg;
      imgEl.src = ogImg;
      imgEl.onload = () => { imgEl.style.opacity = '1'; favEl.style.display = 'none'; };
      imgEl.onerror = () => { imgCache[url] = null; favEl.style.display = 'flex'; };
    } else {
      imgCache[url] = null;
      favEl.style.display = 'flex';
    }
  } catch {
    imgCache[url] = null;
    favEl.style.display = 'flex';
  }
}

// ── INTERSECTION OBSERVER ─────────────────────────────────────────────
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const card = entry.target;
      if (card._imgEl && card._url) loadImage(card._url, card._imgEl, card._favEl);
      observer.unobserve(card);
    }
  });
}, { rootMargin: '200px' });

// ── FILTROS ───────────────────────────────────────────────────────────
function buildFilters() {
  const wrap = document.getElementById('filters');
  wrap.innerHTML = '';
  const categories = ['Todos', ...new Set(refs.map(r => r.cat).filter(Boolean))];
  const countByCat = {};
  refs.forEach(r => { countByCat[r.cat] = (countByCat[r.cat] || 0) + 1; });

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'Todos' ? refs.length : (countByCat[cat] || 0);
    btn.innerHTML = '<span>' + cat + '</span><span class="badge">' + count + '</span>';
    btn.addEventListener('click', () => {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    wrap.appendChild(btn);
  });
}

// ── CARD ──────────────────────────────────────────────────────────────
function createCard(ref) {
  const card = document.createElement('div');
  card.className = 'card';
  const domain = getDomain(ref.url);
  const color = getCatColor(ref.cat);

  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img';

  const pattern = document.createElement('div');
  pattern.className = 'placeholder-pattern';
  imgWrap.appendChild(pattern);

  const imgEl = document.createElement('img');
  imgEl.alt = ref.name;
  imgEl.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.45s;position:absolute;inset:0;';
  imgEl.onerror = () => { imgEl.style.display = 'none'; favEl.style.display = 'flex'; };

  const favEl = document.createElement('div');
  favEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;';
  const favImg = document.createElement('img');
  favImg.src = 'https://www.google.com/s2/favicons?sz=64&domain=' + domain;
  favImg.style.cssText = 'width:28px;height:28px;opacity:0.3;';
  favEl.appendChild(favImg);

  imgWrap.appendChild(favEl);
  imgWrap.appendChild(imgEl);

  card._imgEl = imgEl;
  card._favEl = favEl;
  card._url = ref.url;

  const linkIcon = document.createElement('div');
  linkIcon.className = 'card-link-icon';
  linkIcon.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#c8ff00" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = '<div class="card-name">' + ref.name + '</div><div class="card-cat" style="color:' + color + '">' + ref.cat + '</div>';

  card.appendChild(imgWrap);
  card.appendChild(linkIcon);
  card.appendChild(body);
  card.addEventListener('click', () => window.open(ref.url, '_blank', 'noopener'));
  return card;
}

// ── RENDER ────────────────────────────────────────────────────────────
function getFiltered() {
  return refs.filter(r => {
    const matchCat = activeCategory === 'Todos' || r.cat === activeCategory;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || r.name.toLowerCase().includes(q) || (r.cat||'').toLowerCase().includes(q) || getDomain(r.url).includes(q);
    return matchCat && matchSearch;
  });
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  Array.from(grid.children).forEach(c => { if (c.id !== 'empty') c.remove(); });

  const filtered = getFiltered();
  document.getElementById('count').textContent = filtered.length + ' refs';

  if (!filtered.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  filtered.forEach((ref, i) => {
    const card = createCard(ref);
    card.style.animationDelay = Math.min(i * 15, 300) + 'ms';
    grid.insertBefore(card, empty);
    observer.observe(card);
  });
}

// ── LOADING STATE ─────────────────────────────────────────────────────
function showLoading(msg) {
  const empty = document.getElementById('empty');
  empty.style.display = 'block';
  empty.textContent = msg;
}

function showError(msg) {
  const empty = document.getElementById('empty');
  empty.style.display = 'block';
  empty.innerHTML = msg;
}

// ── INIT ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
  return lines.slice(1).map(line => {
    const values = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { values.push(cur); cur = ''; }
      else { cur += c; }
    }
    values.push(cur);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/^"|"$/g, '').trim(); });
    return obj;
  }).filter(r => r.url && r.name && r.url.startsWith('http'));
}

async function init() {
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  const empty = document.getElementById('empty');
  empty.style.display = 'block';
  empty.textContent = 'Cargando referencias...';

  try {
    const res = await fetch(SHEET_CSV, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    refs = parseCSV(csv);
    if (!refs.length) throw new Error('La hoja está vacía');
    buildFilters();
    render();
  } catch (err) {
    empty.style.display = 'block';
    empty.textContent = 'Error cargando referencias: ' + err.message;
  }
}

init();
</script>
</body>
</html>
